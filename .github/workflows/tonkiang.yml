name: 自动定时更新IPTV源

on:
  schedule:
    # 对应北京时间 08:00, 12:00, 18:00
    - cron: '0 0,4,10 * * *'
  workflow_dispatch: # 支持手动运行测试

jobs:
  build:
    runs-on: ubuntu-latest
    # 赋予提交代码的权限
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install requests beautifulsoup4 lxml

      - name: 运行爬虫脚本
        run: python ZB.py

      - name: 提交并推送结果到仓库
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add iptvhote.txt iptvpmigu.txt
          # 检查是否有文件更新，防止空提交报错
          if git diff --staged --quiet; then
            echo "没有发现内容变化，跳过推送。"
          else
            git commit -m "自动更新: $(date '+%Y-%m-%d %H:%M:%S') (北京时间)"
            git push
          fi
